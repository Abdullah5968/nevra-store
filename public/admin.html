<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nevra Admin | Manage Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 50px 10%; }
        .form-box { background: #111; padding: 30px; border-radius: 10px; border: 1px solid #ff0055; margin-bottom: 50px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; }
        .manage-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .manage-table th, .manage-table td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <header><h1>NEVRA ADMIN PANEL</h1></header>

    <div class="admin-container">
        <div class="form-box">
            <h3>Add New Product</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pPrice" placeholder="Price (e.g. Rs. 5000)">
            <input type="text" id="pImage" placeholder="Image Direct Link (URL)">
            <button onclick="addProduct()" class="shop-now">Upload to Store</button>
        </div>

        <div class="form-box">
            <h3>Manage Existing Products</h3>
            <table class="manage-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-product-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Load products to manage
        async function loadAdminProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const list = document.getElementById('admin-product-list');
            list.innerHTML = '';
            
            products.forEach(p => {
                list.innerHTML += `
                    <tr>
                        <td><img src="${p.image}" class="img-preview"></td>
                        <td>${p.name}</td>
                        <td>${p.price}</td>
                        <td><button class="btn-delete" onclick="deleteProduct('${p._id}')">Delete</button></td>
                    </tr>
                `;
            });
        }

        async function addProduct() {
            const product = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                image: document.getElementById('pImage').value
            };
            await fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(product)
            });
            alert("Product Added!");
            loadAdminProducts(); // Refresh table
        }

        async function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this?")) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadAdminProducts(); // Refresh table
            }
        }

        loadAdminProducts();
    </script>
</body>
</html>

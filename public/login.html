<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nevra | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="form-box" style="width: 400px; padding: 40px;">
        <h2 style="text-align: center; color: #ff0055;">WELCOME BACK</h2>
        <input type="email" id="lEmail" placeholder="Email Address">
        <input type="password" id="lPass" placeholder="Password">
        <button onclick="login()" class="shop-now" style="width: 100%;">Login to Nevra</button>
        <p style="text-align: center; margin-top: 15px; font-size: 14px;">New here? <a href="signup.html" style="color: #ff0055;">Sign Up</a></p>
    </div>

    <script>
        async function login() {
            const credentials = {
                email: document.getElementById('lEmail').value,
                password: document.getElementById('lPass').value
            };
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(credentials)
            });
            const data = await res.json();
            if(data.user) {
                localStorage.setItem('currentUser', data.user);
                alert("Welcome " + data.user);
                window.location.href = "index.html";
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevra Store | Official</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="nav-container">
            <h1 class="logo">NEVRA<span>.</span></h1>
            <nav id="nav-links">
                <a href="index.html">Home</a>
                <a href="#">Shop</a>
                <span id="auth-section">
                    <a href="login.html" class="auth-btn">Login</a>
                    <a href="signup.html" class="auth-btn">Sign Up</a>
                </span>
                <div class="cart-icon" style="cursor: pointer;" onclick="window.location.href='cart.html'">
                    🛒 <span id="cart-count">0</span>
                </div>
            </nav>
        </div>
    </header>

    <section class="banner">
        <div class="banner-content">
            <h2>SUMMER COLLECTION 2026</h2>
            <p>Elevate your style with Nevra's exclusive drops.</p>
            <button class="shop-now">SHOP NOW</button>
        </div>
    </section>

    <main>
        <h2 class="section-title">NEW ARRIVALS</h2>
        <div id="product-list" class="product-grid"></div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>NEVRA STORE</h3>
                <p>Modern streetwear for the bold.</p>
            </div>
            <div class="footer-section">
                <h3>CONTACT US</h3>
                <p>WhatsApp: +92 3XX XXXXXXX</p>
                <p>Email: support@nevrastore.com</p>
            </div>
        </div>
        <p class="copyright">&copy; 2026 Nevra Store. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    
    <script>
        // Check if user is logged in
        const currentUser = localStorage.getItem('currentUser');
        const authSection = document.getElementById('auth-section');

        if (currentUser) {
            // Agar login hai, to user ka naam aur Logout dikhao
            authSection.innerHTML = `
                <span style="color: #ff0055; font-weight: bold; margin-left: 20px;">Hi, ${currentUser}</span>
                <a href="#" onclick="logout()" style="margin-left: 10px; font-size: 12px; color: #666;">Logout</a>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }
    </script>
</body>
</html>
